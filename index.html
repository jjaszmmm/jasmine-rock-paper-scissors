<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>

    <link href="stylesheet" rel="stylesheet">
</head>

<body>

<div class="container">

    <div class="card">
        
        <div class="card-body">

            <h2 class="mb-3">🎮 Rock Paper Scissors</h2>
            <p class="text-light">First to get more points wins</p>

            <!-- Score -->
            <div class="row my-4">
                <div class="col">
                    <div class="score-player">
                        <h6>Player</h6>
                        <h3 id="playerScore">0</h3>
                    </div>
                </div>

                <div class="col">
                    <div class="score-computer">
                        <h6>Computer</h6>
                        <h3 id="computerScore">0</h3>
                    </div>
                </div>
            </div>

            <!-- Buttons -->
            <div class="button-group mb-4">
                <button onclick="play('rock')">✊ Rock</button>
                <button onclick="play('paper')">✋ Paper</button>
                <button onclick="play('scissors')">✌ Scissors</button>
            </div>

            <!-- Result -->
            <div class="result-box">
                <p id="playerChoice" class="mb-1"></p>
                <p id="computerChoice" class="mb-2"></p>
                <h4 id="result" class="fw-bold"></h4>
            </div>

        </div>
    </div>

</div>


</body>
</html>
